name: ci
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_bench_smoke:
        description: "Run WASM bench smoke (signatures + OOM timing)"
        required: false
        default: "false"

concurrency:
  group: rs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install system dependencies (alsa/libudev dev for Bevy)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      # Test before lint: the build runs each crate's build script, emitting
      # the generated sources (src/arora_generated.rs) that `cargo fmt --check`
      # otherwise fails to resolve as modules.
      - run: cargo test --workspace --all-features
      - run: cargo clippy --workspace --all-features --bins --examples --tests -- -D warnings
      - run: cargo fmt --all -- --check

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          # wasm32-wasip1 builds the animation-module artifact (an Arora guest
          # module, not a wasm-bindgen wrapper).
          targets: wasm32-wasip1
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - name: Build WASM into npm wrapper pkg/
        run: node scripts/build-animation-wasm.mjs
      - name: Build Graph WASM into npm wrapper pkg/
        run: node scripts/build-graph-wasm.mjs
      - name: Build Orchestrator WASM into npm wrapper pkg/
        run: node scripts/build-orchestrator-wasm.mjs
      - name: Build Arora-web WASM into npm wrapper pkg/
        run: node scripts/build-arora-web-wasm.mjs
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install workspace dependencies
        run: pnpm install
      - name: Build shared packages
        run: |
          pnpm --filter @vizij/value-json run build
          pnpm --filter @vizij/wasm-loader run build
      - name: Build wasm wrapper packages
        run: |
          pnpm --filter @vizij/animation run build
          pnpm --filter @vizij/node-graph-wasm run build
          pnpm --filter @vizij/orchestrator-wasm run build
          pnpm --filter @vizij/animation-module run build
          pnpm --filter @vizij/runtime run build
      - name: Run wrapper tests
        run: |
          pnpm --filter @vizij/animation run test
          pnpm --filter @vizij/node-graph-wasm run test
          pnpm --filter @vizij/orchestrator-wasm run test
          pnpm --filter @vizij/animation-module run test
          pnpm --filter @vizij/runtime run test

  bench-smoke:
    runs-on: ubuntu-latest
    needs: [wasm]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_bench_smoke == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - name: Build WASM into npm wrapper pkg/
        run: node scripts/build-wasm.mjs
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Install workspace dependencies
        run: pnpm install
      - name: Build shared packages
        run: |
          pnpm --filter @vizij/value-json run build
          pnpm --filter @vizij/wasm-loader run build
      - name: Build wasm wrapper packages
        run: |
          pnpm --filter @vizij/animation run build
          pnpm --filter @vizij/node-graph-wasm run build
          pnpm --filter @vizij/orchestrator-wasm run build
      - name: Run perf smoke (signatures + order-of-magnitude)
        run: pnpm run perf:smoke

  registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install system dependencies (alsa/libudev dev for Bevy)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Verify node registry artifacts are updated
        run: node scripts/verify-node-registry.mjs

  # Proves the animation module's arora_call boundary end-to-end: the typed
  # AnimationClip (Vec<Struct> -> Value::ArrayStructure) marshals through
  # `arora_call` into the wasm module and the sampled TrackOutput marshals back.
  # host_ramp is #[ignore]d because building the wasm artifact from inside the
  # test deadlocks the cargo build lock, so we pre-build the artifact here and
  # then run the test with --ignored (the workspace `cargo test` never runs it).
  animation-module-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-animmod-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build the animation wasm module artifact
        run: cargo build -p vizij-animation-module --target wasm32-wasip1
      - name: Prove the arora_call boundary (host_ramp)
        run: cargo test -p vizij-animation-module --test host_ramp -- --ignored
