name: publish-npm
on:
  workflow_dispatch:
  push:
    tags:
      - 'npm-animation-v*.*.*'   # e.g., npm-animation-v0.1.3
      - 'npm-graph-v*.*.*'       # e.g., npm-graph-v0.1.3
      - 'npm-orchestrator-v*.*.*' # e.g., npm-orchestrator-v0.1.0
      - 'npm-wasm-loader-v*.*.*'  # e.g., npm-wasm-loader-v0.1.0
      - 'npm-value-json-v*.*.*'  # e.g., npm-value-json-v0.1.0

permissions:
  contents: read
  id-token: write     # required for --provenance

jobs:
  publish_animation:
    if: startsWith(github.ref, 'refs/tags/npm-animation-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM into pkg/
        run: node scripts/build-animation-wasm.mjs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Enable pnpm
        run: corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared packages
        run: pnpm run build:shared
      - name: Build wrapper
        run: |
          pnpm --filter @vizij/animation-wasm run build
          pnpm --filter @vizij/animation-wasm run test
          pnpm --filter @vizij/animation-wasm exec npm pack --dry-run

      - name: Publish @vizij/animation-wasm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: pnpm --filter @vizij/animation-wasm exec npm publish --access public --provenance

  publish_graph:
    if: startsWith(github.ref, 'refs/tags/npm-graph-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build Graph WASM into pkg/
        run: node scripts/build-graph-wasm.mjs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Enable pnpm
        run: corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared packages
        run: pnpm run build:shared
      - name: Build graph wrapper
        run: |
          pnpm --filter @vizij/node-graph-wasm run build
          pnpm --filter @vizij/node-graph-wasm run test
          pnpm --filter @vizij/node-graph-wasm exec npm pack --dry-run

      - name: Publish @vizij/node-graph-wasm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: pnpm --filter @vizij/node-graph-wasm exec npm publish --access public --provenance

  publish_orchestrator:
    if: startsWith(github.ref, 'refs/tags/npm-orchestrator-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build Orchestrator WASM into pkg/
        run: node scripts/build-orchestrator-wasm.mjs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Enable pnpm
        run: corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared packages
        run: pnpm run build:shared
      - name: Build orchestrator wrapper
        run: |
          pnpm --filter @vizij/orchestrator-wasm run build
          pnpm --filter @vizij/orchestrator-wasm run test
          pnpm --filter @vizij/orchestrator-wasm exec npm pack --dry-run

      - name: Publish @vizij/orchestrator-wasm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: pnpm --filter @vizij/orchestrator-wasm exec npm publish --access public --provenance

  publish_wasm_loader:
    if: startsWith(github.ref, 'refs/tags/npm-wasm-loader-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Enable pnpm
        run: corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared wasm-loader package
        run: |
          pnpm --filter @vizij/wasm-loader run build
          pnpm --filter @vizij/wasm-loader exec npm pack --dry-run

      - name: Publish @vizij/wasm-loader
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: pnpm --filter @vizij/wasm-loader exec npm publish --access public --provenance

  publish_value_json:
    if: startsWith(github.ref, 'refs/tags/npm-value-json-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Enable pnpm
        run: corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build shared packages
        run: pnpm run build:shared

      - name: Build shared value-json package
        run: |
          pnpm --filter @vizij/value-json run build
          pnpm --filter @vizij/value-json run test
          pnpm --filter @vizij/value-json exec npm pack --dry-run

      - name: Publish @vizij/value-json
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: pnpm --filter @vizij/value-json exec npm publish --access public --provenance
